# Spring 核心配置
spring:
    # RabbitMQ 配置
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
      # 消息确认配置（可选，生产建议开启）
    listener:
      simple:
        acknowledge-mode: auto  # 自动确认
        prefetch: 10           # 限流，防止消息暴冲
  ai:
    dashscope:
      api-key: ${API_KEY}
      chat:
        options:
          model: qwen-plus
      embedding:
        options:
          model: text-embedding-v1
    openai: #openai配置
      base-url: https://dashscope.aliyuncs.com/compatible-mode #阿里百炼api地址
      #      base-url: https://api.chatanywhere.tech #api地址
      api-key: ${API_KEY} #读取环境变量中的阿里百炼 api key
      #      api-key: ${OPENAI_API_KEY} #读取环境变量中的api key
      chat:
        options:
          model: qwen-plus #阿里百炼 模型名称
        enabled: false #关闭OpenAI配置
  #          model: gpt-3.5-turbo #模型名称
    vectorstore:
      pgvector:
        # 这里单独配置 pg 连接！不影响主数据源！
        database-url: jdbc:postgresql://localhost:5432/postgres
        database-username: postgres
        database-password: root



  # MVC配置已简化，避免静态资源映射问题
  # 应用名称
  application:
    name: forum-server
  # 数据库配置
  datasource:
      primary:
        url: jdbc:mysql://localhost:3306/zcy_forum?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
        username: root
        password: root
        driver-class-name: com.mysql.cj.jdbc.Driver
        hikari:
          minimum-idle: 1
          maximum-pool-size: 5
          auto-commit: true


    # 第二个数据源：PostgreSQL（向量库）
      secondary:
        url: jdbc:postgresql://localhost:5432/vector_db
        username: postgres
        password: root
        driver-class-name: org.postgresql.Driver
        hikari:
          minimum-idle: 1
          maximum-pool-size: 5
          auto-commit: true

  # Redis 配置
  data:
    redis:
      # Redis 地址（替换为你的实际IP/端口）
      host: 127.0.0.1
      port: 6379
      # Redis 密码（无密码则注释此行）
      # 数据库索引（默认0）
      database: 0
      # 连接池配置
      lettuce:
        pool:
          # 最大活跃连接数
          max-active: 8
          # 最大空闲连接数
          max-idle: 8
          # 最小空闲连接数
          min-idle: 0
          # 连接等待时间（毫秒）
          max-wait: -1
      # 连接超时时间
      timeout: 5000
  # 日期格式化
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  # 文件上传配置（适配论坛附件/头像上传）
  servlet:
    multipart:
      # 单个文件最大大小
      max-file-size: 10MB
      # 单次请求最大文件大小
      max-request-size: 50MB

# 服务器配置
server:
  # 端口
  port: 8080
  # 编码
  servlet:
    encoding:
      charset: utf-8
      force: true
  # Tomcat 配置
  tomcat:
    # 最大线程数
    threads:
      max: 100
    # 连接超时时间
    connection-timeout: 30000

# MyBatis-Plus 配置
mybatis-plus:
  # Mapper XML 文件路径
  mapper-locations: classpath:mapper/**/*.xml
  # 实体类别名包路径（替换为你的项目实体包）
  type-aliases-package: com.forum.entity
  # 全局配置
  global-config:
    db-config:
      # 主键类型（AUTO-自增，NONE-雪花算法，INPUT-手动输入）
      id-type: AUTO
      # 逻辑删除字段名（适配我们设计的 deleted_at 字段）
#      logic-delete-field: deletedAt
#      # 逻辑删除-未删除值
#      logic-not-delete-value: null
#      # 逻辑删除-已删除值
#      logic-delete-value: now()
      # 表名前缀（如果你的表都有前缀如 t_，可配置此处，否则注释）
      # table-prefix: t_
  # 配置项
  configuration:
    # 开启驼峰命名转换（如 user_id -> userId）
    map-underscore-to-camel-case: true
    # 开启日志（开发环境开启，生产环境关闭）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 懒加载
    lazy-loading-enabled: false
    # 关闭一级缓存
    local-cache-scope: STATEMENT

# 日志配置
logging:
  level:
    # 自定义包日志级别（替换为你的项目包名）
    com.zcy.forum: debug
    # MyBatis 日志级别
    com.baomidou.mybatisplus: info
    # 数据库驱动日志级别
    com.mysql.cj.jdbc: warn
    com.zcy.forum.handler: debug
  # 日志文件路径（生产环境建议配置）
  file:
    path: ./logs/forum-server
#  pattern:
#    # 控制台日志格式
#    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
#    # 文件日志格式
#    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"

# 自定义配置（可根据业务扩展）
forum:
  # 文件上传路径（替换为你的实际路径）
  upload:
    path: ./uploads/
    # 访问前缀（Nginx 配置的静态资源路径）
  # 敏感词过滤开关
  sensitive:
    enable: true
  # 积分配置
  point:
    # 签到基础积分
    sign-base: 10
    # 连续签到额外积分
    sign-continuity: 5

  jwt:
    # 密钥（至少32位，建议随机生成，生产环境需加密存储）
    secret: forum-jwt-secret-2026-12345678901234567890123456
    # 令牌过期时间（小时），默认72小时
    expire-hours: 72
    # 刷新令牌过期时间（小时），默认7天
    refresh-expire-hours: 168
    # 请求头中令牌的key
    header: Authorization
    # 令牌前缀（前端传值格式：Bearer {token}）
    prefix: Bearer
knife4j:
  enable: true
  setting:
    language: zh-CN # 中文界面
    enable-swagger-models: true # 显示模型
    enable-document-manage: true # 启用文档管理

# MinIO 配置
minio:
  endpoint: http://127.0.0.1:9000  # 本地地址，服务器替换为公网IP:9000
  accessKey: minioadmin            # 默认账号
  secretKey: minioadmin            # 默认密码
  bucketName: avatar               # 已创建的桶名

app:
  chat:
    # 是否开启“推荐追问问题”能力。
    # 开启后，主回答生成完成后会额外调用一次模型，产出最多 3 个可继续追问的问题。
    recommendation-enabled: true
    # 单次对话运行过程中，模型最多允许被调用多少次。
    # 这是单次 run 级别的保护阈值，用来避免 ReAct 循环失控。
    max-model-calls-per-run: 8
    # 同一个会话线程累计允许的模型调用上限。
    # 这个限制跨多轮对话生效，用来限制某个 conversationId 长期占用过多资源。
    max-model-calls-per-thread: 40
    # 单次对话运行过程中，工具最多允许被调用多少次。
    # 当前主要限制的是 tavily_search 这类外部联网工具，避免频繁搜索。
    max-tool-calls-per-run: 6
    # 同一个会话线程累计允许的工具调用上限。
    # 用来控制某个会话在长期多轮聊天中的外部工具使用量。
    max-tool-calls-per-thread: 30
    # 生成推荐问题时，最多回看最近多少轮历史问答。
    # 数值越大，上下文越完整，但推荐问题生成的提示词也会更长。
    history-preview-turns: 4
    # 主对话助手的系统提示词。
    # ReactAgent 每次对话都会带上这段指令，用来约束回答风格、工具使用策略和安全边界。
    system-prompt: |
      你是 JavaUp 的智能对话助手。
      你的目标是帮助用户获得可靠、结构化、可直接使用的答案。
      
      回答原则：
      1. 对于明显具有时效性、事实性、需要外部验证的问题，优先调用搜索工具。尤其是涉及“今天、明天、昨天、现在、当前、最新、本周、本月、今年”等相对时间的问题，必须以当前日期为准理解，并优先搜索核实。
      2. 如果工具结果不足以支撑结论，要明确说明不确定性，不要编造事实。
      3. 回答尽量结构化、清晰、简洁，适合直接返回给前端展示。
      4. 不要在最终答案中暴露工具调用细节或内部推理格式。
      5. 当已有信息足够时，直接给出最终答案，不要重复调用工具。
    # 推荐问题生成模型使用的独立提示词。
    # 这部分不参与主回答，只在主回答结束后用于生成 follow-up questions。
    recommendation-prompt: |
      你是推荐问题生成助手。
      请根据最近几轮对话和最新一轮问答，生成 3 个适合继续追问的中文问题。
      
      要求：
      1. 返回 JSON 数组字符串，例如 ["问题1","问题2","问题3"]。
      2. 每个问题都要自然、具体、可继续追问。
      3. 不要和当前问题重复。
      4. 每个问题尽量控制在 20 个字以内。

  tavily:
    # 是否启用 Tavily 联网搜索工具。
    # 关闭后，ReactAgent 即使判断需要搜索，也无法调用该工具。
    enabled: true
    # Tavily API 的服务地址。
    # 如果后续切换代理或企业网关，可以改这里。
    base-url: https://api.tavily.com
    # Tavily 搜索接口路径。
    # 默认使用官方的 /search 端点。
    search-path: /search
    # Tavily 的 API Key。
    # 推荐通过环境变量注入，避免把真实密钥写进配置文件。
    api-key: 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
    # 搜索主题类型。
    # Tavily 当前只接受 general、news、finance 三个枚举值。
    # 一般场景优先用 general。
    topic: general
    # 搜索深度。
    # advanced 会更重一些，但通常能拿到更完整的搜索结果。
    search-depth: advanced
    # 单次搜索最多返回多少条候选结果。
    # 结果越多，引用来源越全，但也会增加模型处理成本。
    max-results: 5
    # 是否让 Tavily 在结果中返回它生成的 answer 摘要。
    # 当前我们主要使用 results 里的来源信息，但 answer 也会被工具结果带回模型。
    include-answer: true
    # 是否返回网页原始全文内容。
    # 默认关闭，避免响应过大；如果后续需要做更深的抽取分析，可以再打开。
    include-raw-content: false